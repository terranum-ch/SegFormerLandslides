downloader:
  # destination: data/test_finetuning/with_multiple_versions/finetuning/test_5
  # destination: data/test_playground
  destination: data/test
  dest_not_empty: replace # choose between 'add', 'stop', 'replace'
  skip_auto_downloading: True
  mode: year  # can be chosen between 'full', 'region', 'area' and 'year'
  canton: "Genève"  # which canton is chosen if the mode is 'canton'
  # canton need to be chosen between:
  #   ['Genève' 'Thurgau' 'Valais' 'Aargau' 'Schwyz' 'Zürich' 'Obwalden'
  #  'Fribourg' 'Glarus' 'Uri' 'Nidwalden' 'Solothurn'
  #  'Appenzell Ausserrhoden' 'Jura' 'Graubünden' 'Vaud' 'Luzern' 'Ticino'
  #  'Zug' 'Basel-Landschaft' 'St. Gallen' 'Schaffhausen' 'Bern' 'Basel-Stadt'
  #  'Neuchâtel' 'Appenzell Innerrhoden']
  area: # which delimitation if the mode is 'area'
    Emin: 2580
    Emax: 2589
    Nmin: 1160
    Nmax: 1169
  year: 2025  # which year if the mode is 'year'
predictions:
  destination: default  # if Default, predict next to original
  # destination: data/test_finetuning/with_multiple_versions/finetuning/preds/stride=128_minsize=100_thpred=0.05_thgroup=0.05
  # model_dir: results/training/20260107_173803_50_epochs_Longxi_Bern_v2_focal_dice_losses
  # model_dir: results/training/20260127_175606_50_epochs_test_playground_polygons
  # model_dir: results/training/20260122_225022_100_epochs_Longxihe_Bern_v2_focal_dice_losses_with_900_false_pos_from_scratch_da_scale
  # model_dir: results/training/20260204_122524_20_epochs_fusion_modulus
  # model_dir: results/training/20260205_150115_20_epochs_fusion_modulus
  # model_dir: results/training/20260212_103807_fusion_20_epochs_multi_resolution
  model_seg_dir: results/training/20260211_172648_segmenter_50_epochs_multi_resolution
  model_fus_dir: results/training/20260216_112606_fusion_20_epochs_test
  # model_dir: results/training/20260211_172648_segmenter_50_epochs_multi_resolution
  batch_size: 2
  threshold_preds: 0.5
  threshold_grouping: 0.3
  tile_size: 2048
  stride: 1024
  scales: [1.0, 0.75, 0.5, 0.25]
  # resolutions: [0.1, 0.5]
  # resolutions: [1.0]
vectorization:
  dbscan_eps: 3
  dbscan_min_samples: 20
  min_cluster_size: 100
  src_color_palette: utils/resources/color_palet.json
to_keep:
  intermed: True
  mask_bin: True
  mask_img: True
  probas: True
  cluster_bin: True
  cluster_img: True