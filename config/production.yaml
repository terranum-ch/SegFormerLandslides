downloader:
  destination: data/test_finetuning/interesting_tiles/preds_all/test3
  dest_not_empty: replace # choose between 'add', 'stop', 'replace'
  skip_auto_downloading: True
  mode: year  # can be chosen between 'full', 'region', 'area' and 'year'
  canton: "Genève"  # which canton is chosen if the mode is 'canton'
  # canton need to be chosen between:
  #   ['Genève' 'Thurgau' 'Valais' 'Aargau' 'Schwyz' 'Zürich' 'Obwalden'
  #  'Fribourg' 'Glarus' 'Uri' 'Nidwalden' 'Solothurn'
  #  'Appenzell Ausserrhoden' 'Jura' 'Graubünden' 'Vaud' 'Luzern' 'Ticino'
  #  'Zug' 'Basel-Landschaft' 'St. Gallen' 'Schaffhausen' 'Bern' 'Basel-Stadt'
  #  'Neuchâtel' 'Appenzell Innerrhoden']
  area: # which delimitation if the mode is 'area'
    Emin: 2580
    Emax: 2589
    Nmin: 1160
    Nmax: 1169
  year: 2025  # which year if the mode is 'year'
predictions:
  # model_dir: results/training/20260107_173803_50_epochs_Longxi_Bern_v2_focal_dice_losses
  # model_dir: results/training/20260119_091455_10_epochs_Longxi_Bern_v2_focal_dice_losses_with_false_pos
  model_dir: results/training/20260119_220452_50_epochs_Bern_v2_focal_dice_losses_with_false_pos_from_scratch
  batch_size: 8
  threshold_preds: 0.1
  threshold_grouping: 0.1
  tile_size: 512
  stride: 256
  resolutions: [1.0, 0.75, 0.5, 0.25, 0.1, 0.05]
  # resolutions: [0.5, 0.25, 0.1]
  # resolutions: [1.0]
  do_rm_intermed_files: False
vectorization:
  dbscan_eps: 3
  dbscan_min_samples: 20
  min_cluster_size: 1000
  src_color_palette: utils/resources/color_palet.json

